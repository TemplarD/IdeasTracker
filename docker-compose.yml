version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ideatracker-postgres
    environment:
      POSTGRES_USER: ideatracker
      POSTGRES_PASSWORD: ideatracker123
      POSTGRES_DB: ideatracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    ports:
      - "5462:5432"
    networks:
      - ideatracker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ideatracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ideatracker-redis
    command: redis-server --requirepass ideatracker123
    volumes:
      - redis_data:/data
    ports:
      - "6400:6379"
    networks:
      - ideatracker-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ideatracker-backend
    environment:
      NODE_ENV: development
      PORT: 3020
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ideatracker
      DB_PASSWORD: ideatracker123
      DB_NAME: ideatracker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ideatracker123
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 1d
      REFRESH_TOKEN_SECRET: your-super-secret-refresh-token-key
      REFRESH_TOKEN_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3021
    volumes:
      - ./backend/src:/app/src:cached
      - uploads:/app/uploads
    ports:
      - "3020:3020"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ideatracker-network
    command: npm run start:dev

  # Frontend Web
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ideatracker-frontend
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: http://localhost:3020/api
      REACT_APP_WS_URL: ws://localhost:3020/ws
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
      - ./frontend/index.html:/app/index.html:cached
      - ./frontend/package.json:/app/package.json:cached
      - ./frontend/tsconfig.json:/app/tsconfig.json:cached
      - ./frontend/vite.config.ts:/app/vite.config.ts:cached
    ports:
      - "3021:3021"
    depends_on:
      - backend
    networks:
      - ideatracker-network
    command: npm run start -- --port 3021

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

networks:
  ideatracker-network:
    driver: bridge
